name: AML Triage CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: | 
          pip install -r requirements.txt
          pip install -r requirements-test.txt
     

      - name: Configure DVC credentials
        env:
          DAGSHUB_TOKEN: ${{ secrets.AML_TEST }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
        run: |
          dvc remote modify myremote auth basic
          dvc remote modify myremote user virajdeshmukh080818
          dvc remote modify myremote password $DAGSHUB_TOKEN
      
      - name: Cache DVC cache
        uses: actions/cache@v4
        with:
          path: .dvc/cache
          key: ${{ runner.os }}-dvc-${{ hashFiles('dvc.lock') }}
          restore-keys: |
            ${{ runner.os }}-dvc-


      - name: Pull DVC data
        run: dvc pull


      - name: Run Pipeline
        env:
          DAGSHUB_TOKEN: ${{ secrets.AML_TEST }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
        run: |
          # Configure DVC remote to use basic auth with your token
          dvc remote modify myremote auth basic
          dvc remote modify myremote user virajdeshmukh080818
          dvc remote modify myremote password $DAGSHUB_TOKEN
          # Download the actual .pkl files into the GitHub runner
          dvc repro
          dvc push


      - name: Run Model Tests
        env:
          DAGSHUB_TOKEN: ${{ secrets.AML_TEST }}
        run: python -m pytest tests/test_model.py

      
      - name: Promote Model to Production
        if: success()
        env:
          DAGSHUB_TOKEN: ${{ secrets.AML_TEST }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME}}
        run:
          python scripts/promote_model.py

        
      - name: Run FastAPI App tests
        if: success()
        run: python -m pytest tests/test_app.py


